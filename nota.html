<div style="font-family:Arial,sans-serif;font-size:12px;color:#222;max-width:360px;margin:0 auto;">
  <div style="text-align:center;border-bottom:1px dashed #999;padding-bottom:8px;margin-bottom:8px;">
    <h3 style="margin:0;">{{store_name}}</h3>
    <div>{{store_address}}</div>
    <div>Telp: {{store_phone}}</div>
    <div>Rek: {{bank_account}}</div>
  </div>

  <table style="width:100%;font-size:12px;margin-bottom:8px;">
    <tr><td>No Nota</td><td style="text-align:right;">{{invoice_no}}</td></tr>
    <tr><td>Tanggal</td><td style="text-align:right;">{{transaction_at}}</td></tr>
    <tr><td>Pelanggan</td><td style="text-align:right;">{{customer_name}}</td></tr>
  </table>

  <div style="border-top:1px dashed #999;border-bottom:1px dashed #999;padding:6px 0;margin-bottom:8px;">
    {{items_rows}}
  </div>

  <table style="width:100%;font-size:12px;">
    <tr><td>Total</td><td style="text-align:right;">{{total}}</td></tr>
    <tr><td>Bayar</td><td style="text-align:right;">{{paid_amount}}</td></tr>
    <tr><td>Kembali</td><td style="text-align:right;">{{change_amount}}</td></tr>
    <tr><td>Status</td><td style="text-align:right;">{{status}}</td></tr>
  </table>

  <div style="text-align:center;margin-top:10px;font-size:11px;color:#666;">
    {{footer_text}}
  </div>
</div>
